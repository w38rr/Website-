<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Playground Scripts</title>
<!-- Optional: include a Google Font for better typography -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
<style>
/* Reset and base styles */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0b1220, #1e293b);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
    transition: background 0.5s;
}

/* Dark mode toggle button */
#darkModeToggle {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #2563eb;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: background 0.3s;
}
#darkModeToggle:hover {
    background: #1d4ed8;
}

/* Container styles */
.container {
    width: 440px;
    max-width: 90%;
    background: rgba(15, 23, 42, 0.98);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(4px);
    position: relative;
}

/* Heading styles */
h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 20px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #f0f0f0;
}

/* Search input with icon */
.search-container {
    position: relative;
    margin-bottom: 20px;
}
#search {
    width: 100%;
    padding: 14px 16px 14px 40px;
    border: none;
    border-radius: 12px;
    background: #222b45;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: background 0.3s, box-shadow 0.3s;
}
#search:focus {
    background: #2a3a5c;
    box-shadow: 0 0 8px #2563eb;
}
/* Search icon */
.search-container::before {
    content: "🔍";
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    font-size: 18px;
    color: #aaa;
}

/* Script list styles */
.script-list {
    max-height: 540px;
    overflow-y: auto;
}

/* Script card styles with hover effects */
.script-card {
    background: #1f2937;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    transition: transform 0.2s, box-shadow 0.2s;
}
.script-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 24px rgba(0,0,0,0.3);
}

/* Script name styles */
.script-name {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 10px;
    color: #e0e0e0;
}

/* Button styles with icon */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background-color: #3b82f6;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background-color 0.3s, transform 0.2s;
}
button:hover {
    background-color: #2563eb;
    transform: translateY(-2px);
}

/* Status message styles */
.status {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
    color: #22c55e;
    font-weight: 500;
    height: 20px;
    opacity: 0;
    transition: opacity 0.3s;
}
.status.show {
    opacity: 1;
}

/* Toast notification styles */
#toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: #222b45;
    padding: 12px 20px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    color: #fff;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.4s, transform 0.4s;
}
#toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(-10px);
}
</style>
</head>
<body>

<!-- Dark mode toggle button -->
<button id="darkModeToggle">Toggle Dark Mode</button>

<div class="container">
<h1>Playground Scripts</h1>
<div class="search-container">
    <input type="text" id="search" placeholder="Search scripts..." onkeyup="filterScripts()" />
</div>
<div class="script-list" id="scriptList"></div>
<div class="status" id="status"></div>
</div>

<!-- Toast notification -->
<div id="toast"></div>

function renderScripts(filter="") {
    const list = document.getElementById("scriptList");
    list.innerHTML = "";
    scripts
        .filter(s => s[0].toLowerCase().includes(filter.toLowerCase()))
        .forEach(script => {
            list.innerHTML += `
        <div class="script-card">
            <div class="script-name">${script[0]}</div>
            <button onclick='copyScript(${JSON.stringify(script[1])})'>Copy Script</button>
        </div>`;
        });
}

function copyScript(script) {
    navigator.clipboard.writeText(script);
    showToast("Script copied!");
}

function filterScripts() {
    renderScripts(document.getElementById("search").value);
}

// Dark mode toggle
const toggleButton = document.getElementById("darkModeToggle");
toggleButton.onclick = () => {
    document.body.classList.toggle("dark-mode");
    if (document.body.classList.contains("dark-mode")) {
        document.body.style.background = "linear-gradient(135deg, #000000, #222)";
        toggleButton.innerText = "Light Mode";
    } else {
        document.body.style.background = "linear-gradient(135deg, #0b1220, #1e293b)";
        toggleButton.innerText = "Dark Mode";
    }
}

// Toast notification function
function showToast(message) {
    const toast = document.getElementById("toast");
    toast.innerText = message;
    toast.classList.add("show");
    setTimeout(() => {
        toast.classList.remove("show");
    }, 1500);
}

// Initial render
renderScripts();
</script>

<style>
html, body, * { -webkit-box-sizing: border-box; box-sizing: border-box; margin: 0; padding: 0; }

html { background: #000; }

body {

background: #000 !important;

display: -webkit-flex;
display: flex;
-webkit-justify-content: center;
justify-content: center;
padding: 20px 12px 32px;
}

body::before {
content: ‘’;
position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
background-image:
linear-gradient(rgba(200,30,30,.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(200,30,30,.03) 1px, transparent 1px);

pointer-events: none;
z-index: 0;
}

body::after {
content: ‘’;
position: fixed;
top: -30%; left: 50%;
-webkit-transform: translateX(-50%);
transform: translateX(-50%);
width: 500px; height: 300px;
background: radial-gradient(ellipse, rgba(180,20,20,.06) 0%, transparent 70%);

}

.container {
position: relative;

width: 400px;
max-width: 100%;

animation: up .4s cubic-bezier(.16,1,.3,1) both;
}

@-webkit-keyframes up {
from { opacity: 0; -webkit-transform: translateY(16px); }
to   { opacity: 1; -webkit-transform: translateY(0); }
}
@keyframes up {
from { opacity: 0; transform: translateY(16px); }
to   { opacity: 1; transform: translateY(0); }

/* ── CHROME ── */
.chrome {
background: #0d0d0d;

/* ── TITLEBAR ── */

/* ── HEADER ── */

display: -webkit-flex;
display: flex;

/* small red bar accent instead of emoji */

letter-spacing: .04em;

flex-shrink: 0;

}

/* ── SEARCH ── */
.search-wrap {
padding: 7px 10px;

}

.search-icon {

left: 20px;
top: 50%;
-webkit-transform: translateY(-50%);
transform: translateY(-50%);

font-size: 13px;

input[type=“text”] {

padding: 6px 10px 6px 28px;

border: 1px solid #1e1e1e;
border-radius: 6px;
color: #aab8cc;

input[type=“text”]::placeholder { color: #333; }
input[type=“text”]:focus {
border-color: rgba(192,57,43,.5);
-webkit-box-shadow: 0 0 0 3px rgba(192,57,43,.07);
box-shadow: 0 0 0 3px rgba(192,57,43,.07);
}

/* ── LIST ── */
.script-list {
max-height: 420px;
overflow-y: auto;
padding: 3px 6px;
-webkit-overflow-scrolling: touch;
scrollbar-width: thin;
scrollbar-color: #1e1e1e transparent;
}

.script-list::-webkit-scrollbar { width: 3px; }
.script-list::-webkit-scrollbar-track { background: transparent; }
.script-list::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

.script-row {
display: -webkit-flex;
display: flex;
-webkit-align-items: center;
align-items: center;
padding: 0 6px;
height: 32px;
border-radius: 5px;
-webkit-transition: background .1s;
transition: background .1s;
-webkit-animation: rowIn .2s ease both;
animation: rowIn .2s ease both;
}

.script-row:hover { background: rgba(255,255,255,.04); }
.script-row:hover .copy-btn { opacity: 1; }

@-webkit-keyframes rowIn {
from { opacity: 0; }
to   { opacity: 1; }
}
@keyframes rowIn {
from { opacity: 0; }
to   { opacity: 1; }
}

.row-num {
font-family: ‘Share Tech Mono’, monospace;
font-size: 9px;
color: #2a2a2a;
width: 20px;
-webkit-flex-shrink: 0;
flex-shrink: 0;
}

.row-name {
font-size: 12px;
font-weight: 500;
color: #c8c8c8;
-webkit-flex: 1;
flex: 1;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.copy-btn {
opacity: 0;
border: 1px solid #222;
background: transparent;
color: #444;
padding: 2px 8px;
border-radius: 4px;
font-family: ‘Share Tech Mono’, monospace;
font-size: 9px;
letter-spacing: .05em;
cursor: pointer;
text-transform: uppercase;
-webkit-transition: all .15s;
transition: all .15s;
-webkit-flex-shrink: 0;
flex-shrink: 0;
-webkit-appearance: none;
appearance: none;
line-height: 1.6;
}

.copy-btn:hover, .copy-btn:active {
border-color: #c0392b;
color: #c0392b;
background: rgba(192,57,43,.08);
}

.copy-btn.copied {
border-color: #27ae60;
color: #27ae60;
background: rgba(39,174,96,.07);
opacity: 1 !important;
}

@media (hover: none) { .copy-btn { opacity: 1; } }

/* ── FOOTER ── */
.footer {
padding: 6px 12px;
border-top: 1px solid #1a1a1a;
display: -webkit-flex;
display: flex;
-webkit-align-items: center;
align-items: center;
-webkit-justify-content: space-between;
justify-content: space-between;
background: #080808;
}

.status {
font-family: ‘Share Tech Mono’, monospace;
font-size: 9px;
color: #27ae60;
letter-spacing: .05em;
opacity: 0;
-webkit-transition: opacity .25s;
transition: opacity .25s;
}
.status.on { opacity: 1; }

.count {
font-family: ‘Share Tech Mono’, monospace;
font-size: 9px;
color: #333;
letter-spacing: .04em;
}

.no-results {
text-align: center;
padding: 20px 0;
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
color: #333;
}
</style>

</head>
<body>

  <div class="chrome">
    <div class="titlebar">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
      <span class="title-text">playground_scripts.exe</span>
    </div>
    <div class="header">
      <div class="header-left">
        <div class="logo-bar"></div>
        <div class="header-text">
          <h1>Playground Scripts</h1>

    <div class="footer">
      <div class="status" id="status">&#10003; copied</div>

  </div>
</div>

["Soccer Arena",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Soccer-arena"))()'],
["Speed Brainrot",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Speed-brainrot"))()'],
["Sword Reach",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Sword%20reach"))()'],
["Touch Soccer",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Touch%20soccer"))()'],
["Violent",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Violent"))()']
];

document.getElementById('badge').textContent = scripts.length + ' scripts';

var timer;

var filtered = [];

function render(filter) {
  filter = filter || '';
  var list = document.getElementById('scriptList');
  filtered = scripts.filter(function(s){ return s[0].toLowerCase().indexOf(filter.toLowerCase()) !== -1; });

  if (!filtered.length) {
    list.innerHTML = '<div class="no-results">no scripts found</div>';
  } else {
    list.innerHTML = filtered.map(function(s, i){
      var delay = Math.min(i*10,160);
      return '<div class="script-row" style="-webkit-animation-delay:' + delay + 'ms;animation-delay:' + delay + 'ms">' +
        '<span class="row-num">' + (i+1 < 10 ? '0' + (i+1) : i+1) + '</span>' +
        '<span class="row-name">' + s[0] + '</span>' +
        '<button class="copy-btn" data-idx="' + i + '">copy</button>' +
      '</div>';
    }).join('');
  }

  document.getElementById('count').textContent =
    filter ? filtered.length + ' / ' + scripts.length : scripts.length + ' total';
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

function doCopy(btn, text) {
  function onSuccess() {
    btn.textContent = 'done';
    btn.classList.add('copied');
    setTimeout(function(){ btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1400);
    var st = document.getElementById('status');
    st.classList.add('on');
    clearTimeout(timer);
    timer = setTimeout(function(){ st.classList.remove('on'); }, 1800);
  }
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(function(){ fallbackCopy(text); onSuccess(); });
  } else {
    fallbackCopy(text);
    onSuccess();
  }
}

document.getElementById('scriptList').addEventListener('click', function(e) {
  var btn = e.target;
  if (btn.classList.contains('copy-btn')) {
    var idx = parseInt(btn.getAttribute('data-idx'), 10);
    if (!isNaN(idx) && filtered[idx]) {
      doCopy(btn, filtered[idx][1]);
    }
  }
});

function filterScripts() { render(document.getElementById('search').value); }

render();
</script>

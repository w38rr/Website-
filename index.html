<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Script Hub</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: rgba(30, 41, 59, 0.95);
        padding: 25px;
        border-radius: 18px;
        width: 320px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        text-align: center;
    }

    h1 {
        font-size: 22px;
        margin-bottom: 20px;
    }

    .script-card {
        background: #0f172a;
        border-radius: 12px;
        padding: 18px;
        margin-top: 15px;
    }

    .script-title {
        font-size: 18px;
        margin-bottom: 12px;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #38bdf8;
        border: none;
        border-radius: 10px;
        color: white;
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #0ea5e9;
        transform: scale(1.03);
    }

    .status {
        margin-top: 15px;
        font-size: 14px;
        color: #22c55e;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Roblox Script Hub 🚀</h1>

    <div class="script-card">
        <div class="script-title">All Characters Script</div>
        <button onclick="copyScript()">Copy Script</button>
    </div>

    <div class="status" id="status"></div>
</div>

<script>
async function copyScript() {
    const script = 'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/All%20characters"))()';

    try {
        await navigator.clipboard.writeText(script);
        document.getElementById("status").innerText = "✅ Script copied!";
    } catch {
        document.getElementById("status").innerText = "❌ Copy failed";
    }
}
</script>

</body>
</html>

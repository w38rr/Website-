<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playground Scripts</title>
<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:system-ui,sans-serif;
    background:radial-gradient(circle at top,#1e293b,#020617);
    color:white;
    display:flex;
    justify-content:center;
    padding:24px;
}

.container{
    width:430px;
    background:rgba(15,23,42,.85);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:24px;
    box-shadow:0 20px 50px rgba(0,0,0,.45);
}

h1{
    text-align:center;
    font-size:24px;
    font-weight:600;
    margin-bottom:20px;
    letter-spacing:.5px;
}

.search-box{
    position:sticky;
    top:0;
    background:rgba(15,23,42,.95);
    padding-bottom:14px;
    z-index:10;
}

input{
    width:100%;
    padding:13px 14px;
    border:none;
    border-radius:14px;
    background:#111827;
    color:white;
    font-size:14px;
    outline:none;
    border:1px solid rgba(255,255,255,.06);
}

.script-list{
    max-height:560px;
    overflow-y:auto;
    padding-right:4px;
}

.script-list::-webkit-scrollbar{
    width:6px;
}

.script-list::-webkit-scrollbar-thumb{
    background:#334155;
    border-radius:20px;
}

.script-card{
    background:rgba(17,24,39,.9);
    border:1px solid rgba(255,255,255,.05);
    border-radius:16px;
    padding:14px;
    margin-bottom:12px;
    transition:.25s ease;
}

.script-card:hover{
    transform:translateY(-2px);
    border-color:rgba(37,99,235,.4);
}

.script-name{
    font-size:14px;
    margin-bottom:10px;
    color:#e5e7eb;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#2563eb,#1d4ed8);
    color:white;
    font-size:14px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    opacity:.92;
}

.status{
    text-align:center;
    margin-top:14px;
    font-size:14px;
    color:#22c55e;
}
</style>
</head>
<body>

<div class="container">
    <h1>Playground Scripts</h1>

    <div class="search-box">
        <input type="text" id="search" placeholder="Search scripts..." onkeyup="filterScripts()">
    </div>

    <div class="script-list" id="scriptList"></div>

    <div class="status" id="status"></div>
</div>

<script>
const scripts = [
["All Characters",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/All%20characters"))()'],
["Arcade Basketball",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Arcade%20basketball"))()'],
["Blood Debt",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Blood%20debt"))()'],
["Brookhaven",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Brookhaven"))()'],
["Bug Test",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Bug%20test"))()'],
["Bypass Marvellous",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Bypass-marvellous"))()'],
["Carry People 3",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Carry%20people%203"))()'],
["Characters v1",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Characters%20v1"))()'],
["Characters v2",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Characters%20v2"))()'],
["Characters v3",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Characters%20v3"))()'],
["Chicago Trenches",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Chicago-Trenches"))()'],
["Violent",'loadstring(game:HttpGet("https://raw.githubusercontent.com/w38rr/w38r/main/Violent"))()']
];

function renderScripts(filter=""){
    const list=document.getElementById("scriptList");
    list.innerHTML="";
    scripts.filter(s=>s[0].toLowerCase().includes(filter.toLowerCase()))
    .forEach(script=>{
        list.innerHTML+=`
        <div class="script-card">
            <div class="script-name">${script[0]}</div>
            <button onclick='copyScript(${JSON.stringify(script[1])})'>Copy Script</button>
        </div>`;
    });
}

function copyScript(script){
    navigator.clipboard.writeText(script);
    document.getElementById("status").innerText="Copied";
}

function filterScripts(){
    renderScripts(document.getElementById("search").value);
}

renderScripts();
</script>

</body>
</html>
